<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeHands - A Drawing WebApp</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <div class="app-container">
        <nav class="menu-bar">
            <div class="menu-item">File</div>
            <div class="menu-item">Edit</div>
            <div class="menu-item">View</div>
            <div class="menu-item">Image</div>
            <div class="menu-item">Layer</div>
        </nav>

        <header class="toolbar">
            <div class="tool-group">
                <label for="brush-size" class="control-label">Size</label>
                <input type="number" id="brush-size-val" min="1" max="100" value="5">
                <span>px</span>
                <input type="range" id="brush-size" min="1" max="100" value="5" class="slider">
            </div>

            <div class="spacer" style="width: 20px;"></div>

            <div class="tool-group">
                <label for="brush-opacity" class="control-label">Opacity</label>
                <input type="number" id="brush-opacity-val" min="0" max="100" value="100">
                <span>%</span>
                <input type="range" id="brush-opacity" min="0" max="100" value="100" class="slider">
            </div>
        </header>

        <div class="main-workspace">

            <aside class="sidebar left-sidebar">
                <div class="docker-title" style="text-align: center; font-size: 0.7rem;">Tools</div>
                <div class="docker-content toolbox-grid">

                    <button class="tool-btn active" id="btn-brush" title="Pincel">
                        <img src="src/assets/icons/Toolbar/Brush.svg" alt="Pincel" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-eraser" title="Borracha">
                        <img src="src/assets/icons/Toolbar/eraser.svg" alt="Borracha" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-fill" title="Balde">
                        <img src="src/assets/icons/Toolbar/Fill.svg" alt="Balde" width="22" height="22">
                    </button>

                    <div style="height: 1px; background: var(--border-color); width: 80%; margin: 5px 0;"></div>

                    <button class="tool-btn" id="btn-pan" title="Mover / Pan">
                        <img src="src/assets/icons/Toolbar/hand.svg" alt="Mover" width="22" height="22">
                    </button>

                </div>
            </aside>

            <main class="canvas-container">
                <canvas id="drawing-canvas"></canvas>
            </main>

            <aside class="sidebar right-sidebar">
                <div class="docker" style="flex-grow: 0; min-height: 240px;">
                    <div class="docker-title">Color Selector (HSV)</div>
                    <div class="docker-content color-picker-container">
                        <canvas id="color-wheel-canvas"></canvas>

                        <div class="current-color-display">
                            <div id="active-color-preview"></div>
                            <span id="color-hex-code">#000000</span>
                        </div>
                    </div>
                </div>

                <div class="docker" style="flex-grow: 0; height: 150px;">
                    <div class="docker-title">Color palette</div>
                    <div class="docker-content" style="overflow-y: auto;">
                        <div id="color-palette" class="palette-grid">
                        </div>
                    </div>
                </div>

                <div class="docker">
                    <div class="docker-title">Layers</div>
                    <div class="docker-content" id="layers-list">
                        <div style="font-style: italic; opacity: 0.5;">Layer 1 (Background)</div>
                    </div>
                </div>
            </aside>

        </div>

        <footer class="status-bar">
            <div class="status-left">Ready</div>
            <div class="status-right">
                <span>800 x 600 px</span>
                <span>RGB (8-bit)</span>
                <span id="zoom-val-display">Zoom: 100%</span>
            </div>
        </footer>
    </div>

    <script type="module" src="src/js/app.js"></script>
</body>

</html>
