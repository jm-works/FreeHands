<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeHands - A Drawing WebApp</title>

    <link rel="shortcut icon" href="src/assets/logo/Icon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Special+Elite&family=Oswald:wght@400;600;700&family=Dancing+Script:wght@700&family=Bebas+Neue&family=Merriweather:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="src/css/bodyStyle.css">
    <link rel="stylesheet" href="src/css/toolbarStyle.css">
    <link rel="stylesheet" href="src/css/menuStyle.css">
    <link rel="stylesheet" href="src/css/sidebarStyle.css">
    <link rel="stylesheet" href="src/css/paletteStyle.css">
    <link rel="stylesheet" href="src/css/introductionStyle.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>

<body>
    <div id="fh-root">
        <canvas id="fh-c"></canvas>
    </div>

    <div class="app-container">

        <nav class="menu-bar">
            <div class="app-logo">
                <span class="app-logo-text">Free<span>Hands</span></span>
            </div>

            <div class="menu-item" id="menu-file">File</div>
            <div class="menu-item" id="menu-edit">Edit</div>
        </nav>

        <header class="toolbar">
            <div class="value-slider" id="size-container">
                <input type="range" id="brush-size" min="1" max="100" value="5" class="tool-slider">
                <div class="value-slider-overlay">
                    <label for="brush-size">Size</label>
                    <div class="value-slider-inputs">
                        <input type="number" id="brush-size-val" min="1" max="100" value="5">
                        <span>px</span>
                    </div>
                </div>
            </div>

            <div class="value-slider" id="opacity-container">
                <input type="range" id="brush-opacity" min="0" max="100" value="100" class="tool-slider">
                <div class="value-slider-overlay">
                    <label for="brush-opacity">Opacity</label>
                    <div class="value-slider-inputs">
                        <input type="number" id="brush-opacity-val" min="0" max="100" value="100">
                        <span>%</span>
                    </div>
                </div>
            </div>

            <div class="value-slider" id="stabilizer-container" style="display: none;">
                <input type="range" id="brush-stabilizer" min="0" max="100" value="0" class="tool-slider">
                <div class="value-slider-overlay">
                    <label for="brush-stabilizer">Stabilizer</label>
                    <div class="value-slider-inputs">
                        <input type="number" id="brush-stabilizer-val" min="0" max="100" value="0">
                        <span>%</span>
                    </div>
                </div>
            </div>

            <div class="value-slider" id="tolerance-container" style="display: none;">
                <input type="range" id="fill-tolerance" min="0" max="255" value="32" class="tool-slider">
                <div class="value-slider-overlay">
                    <label for="fill-tolerance">Tolerance</label>
                    <div class="value-slider-inputs">
                        <input type="number" id="fill-tolerance-val" min="0" max="255" value="32">
                    </div>
                </div>
            </div>

            <div id="text-controls" style="display: none;">

                <div class="value-slider text-font-slider">
                    <select id="text-font" class="text-font-select">
                        <option value="sans-serif">Sans-Serif</option>
                        <option value="serif">Serif</option>
                        <option value="monospace">Monospace</option>
                        <option value="Oswald">Oswald</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Special Elite">Special Elite</option>
                        <option value="Dancing Script">Dancing Script</option>
                        <option value="Bebas Neue">Bebas Neue</option>
                        <option value="Merriweather">Merriweather</option>
                        <option value="Space Mono">Space Mono</option>
                    </select>
                    <div class="value-slider-overlay">
                        <span id="text-font-label" class="text-font-label">Sans-Serif</span>
                    </div>
                </div>

                <div class="value-slider" style="width: 120px;">
                    <input type="range" id="text-size" min="8" max="200" value="24" class="tool-slider">
                    <div class="value-slider-overlay">
                        <label for="text-size">Size</label>
                        <div class="value-slider-inputs">
                            <input type="number" id="text-size-val" min="8" max="200" value="24">
                            <span>px</span>
                        </div>
                    </div>
                </div>

                <div class="value-slider" style="width: 115px;">
                    <input type="range" id="text-leading" min="50" max="300" value="120" class="tool-slider">
                    <div class="value-slider-overlay">
                        <label for="text-leading">Leading</label>
                        <div class="value-slider-inputs">
                            <input type="number" id="text-leading-val" min="50" max="300" value="120">
                            <span>%</span>
                        </div>
                    </div>
                </div>

                <div class="value-slider" style="width: 120px;">
                    <input type="range" id="text-spacing" min="-200" max="800" value="0" class="tool-slider">
                    <div class="value-slider-overlay">
                        <label for="text-spacing">Spacing</label>
                        <div class="value-slider-inputs">
                            <input type="number" id="text-spacing-val" min="-200" max="800" value="0">
                        </div>
                    </div>
                </div>

                <div class="tool-group text-style-group">
                    <button class="tool-btn text-style-btn" id="btn-text-bold" title="Bold">
                        <span>B</span>
                    </button>
                    <button class="tool-btn text-style-btn" id="btn-text-italic" title="Italic">
                        <span>I</span>
                    </button>
                    <button class="tool-btn text-style-btn" id="btn-text-underline" title="Underline">
                        <span>U</span>
                    </button>
                </div>

                <div class="tool-group text-align-group">
                    <button class="tool-btn text-align-btn" id="btn-text-align-left" title="Align Left">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                            <rect x="1" y="2" width="12" height="1.5" rx="0.5" />
                            <rect x="1" y="5.5" width="8" height="1.5" rx="0.5" />
                            <rect x="1" y="9" width="12" height="1.5" rx="0.5" />
                            <rect x="1" y="12.5" width="6" height="1.5" rx="0.5" />
                        </svg>
                    </button>
                    <button class="tool-btn text-align-btn" id="btn-text-align-center" title="Align Center">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                            <rect x="1" y="2" width="12" height="1.5" rx="0.5" />
                            <rect x="3" y="5.5" width="8" height="1.5" rx="0.5" />
                            <rect x="1" y="9" width="12" height="1.5" rx="0.5" />
                            <rect x="4" y="12.5" width="6" height="1.5" rx="0.5" />
                        </svg>
                    </button>
                    <button class="tool-btn text-align-btn" id="btn-text-align-right" title="Align Right">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                            <rect x="1" y="2" width="12" height="1.5" rx="0.5" />
                            <rect x="5" y="5.5" width="8" height="1.5" rx="0.5" />
                            <rect x="1" y="9" width="12" height="1.5" rx="0.5" />
                            <rect x="7" y="12.5" width="6" height="1.5" rx="0.5" />
                        </svg>
                    </button>
                </div>

                <div id="text-color-wrap" class="text-color-wrap" title="Text Color">
                    <div id="text-color-swatch" class="text-color-swatch" style="background: #000000;"></div>
                </div>

            </div>
        </header>

        <div class="main-workspace">
            <aside class="sidebar left-sidebar">
                <div class="docker-title" style="text-align: center; font-size: 0.6rem; padding: 6px 4px;">Tools</div>
                <div class="docker-content toolbox-grid">

                    <button class="tool-btn active" id="btn-brush" title="Brush">
                        <img src="src/assets/icons/Toolbar/Brush.svg" alt="Brush" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-pen" title="Pen">
                        <img src="src/assets/icons/Toolbar/Pen.svg" alt="Pen" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-eyedropper" title="Color Picker">
                        <img src="src/assets/icons/Toolbar/color_picker.svg" alt="Color Picker" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-text" title="Text">
                        <img src="src/assets/icons/Toolbar/text.svg" alt="Text" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-eraser" title="Eraser">
                        <img src="src/assets/icons/Toolbar/eraser.svg" alt="Eraser" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-fill" title="Fill">
                        <img src="src/assets/icons/Toolbar/Fill.svg" alt="Fill" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-line" title="Line">
                        <img src="src/assets/icons/Toolbar/line.svg" alt="Line" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-rectangle" title="Rectangle">
                        <img src="src/assets/icons/Toolbar/rectangle.svg" alt="Rectangle" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-ellipse" title="Ellipse">
                        <img src="src/assets/icons/Toolbar/ellipse.svg" alt="Ellipse" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-cutarea" title="Cut Area">
                        <img src="src/assets/icons/Toolbar/cutArea.svg" alt="Cut Area" width="22" height="22">
                    </button>

                    <button class="tool-btn" id="btn-select" title="Select">
                        <img src="src/assets/icons/Toolbar/select.svg" alt="Select" width="22" height="22">
                    </button>

                    <div style="height: 1px; background: var(--border-color); width: 70%; margin: 4px 0;"></div>

                    <button class="tool-btn" id="btn-pan" title="Pan">
                        <img src="src/assets/icons/Toolbar/hand.svg" alt="Pan" width="22" height="22">
                    </button>

                </div>
            </aside>

            <main class="workspace-area">
                <canvas id="drawing-canvas"></canvas>
            </main>

            <aside class="sidebar right-sidebar">
                <div class="docker">
                    <div class="docker-title">Color Selector (HSV)</div>
                    <div class="docker-content color-picker-container">
                        <canvas id="color-wheel-canvas"></canvas>
                        <div class="current-color-display">
                            <div id="active-color-preview"></div>
                            <div class="hex-input-wrapper">
                                <span class="hex-prefix">#</span>
                                <input id="color-hex-code" type="text" value="000000" maxlength="6" spellcheck="false" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="docker">
                    <div class="docker-title">Color Palette</div>
                    <div class="docker-content">
                        <div id="color-palette" class="palette-grid"></div>
                    </div>
                </div>

                <div class="docker">
                    <div class="docker-title">Layers</div>
                    <div class="docker-content" id="layers-list">
                        <div style="font-style: italic; opacity: 0.5; font-family: var(--font-mono); font-size: 0.78rem;">Layer 1 (Background)</div>
                    </div>
                </div>
            </aside>
        </div>

        <footer class="status-bar">
            <div class="status-left">Ready</div>
            <div class="status-right">
                <span id="canvas-size-display">800 x 600 px</span>
                <span>RGB / 8-bit</span>
                <span id="zoom-val-display">Zoom: 100%</span>
            </div>
        </footer>
    </div>

    <script type="module" src="src/js/app.js"></script>
</body>

</html>
